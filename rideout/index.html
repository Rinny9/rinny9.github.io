<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#00e5a0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ride-Out">
  <title>ACP Ride-Out Tracker</title>
  <link rel="manifest" href="./manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1120;
      --surface: #111827;
      --border: #1e293b;
      --text: #f0f4f8;
      --muted: #64748b;
      --subtle: #94a3b8;
      --accent: #00e5a0;
      --accent2: #00b4d8;
      --danger: #f87171;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Plus Jakarta Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font: 700 20px/1 var(--mono);
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .badge {
      background: var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font: 600 14px var(--mono);
      color: var(--accent);
    }
    .badge span { font-weight: 400; opacity: 0.7; }

    /* Nav */
    nav {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    nav button {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--muted);
      font: 600 12px var(--sans);
      padding: 8px 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    nav button.active {
      background: var(--border);
      color: var(--accent);
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin: 16px 16px 0;
    }
    .card-title {
      margin: 0 0 14px;
      font: 600 13px var(--sans);
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Progress ring */
    .ring-wrap { text-align: center; }
    .ring-wrap svg { display: block; margin: 0 auto; }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
    .ring-fill {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);
    }
    .ring-pct { fill: var(--text); font: 700 32px var(--mono); }
    .ring-label { fill: var(--muted); font: 400 12px var(--mono); letter-spacing: 1px; }

    /* Stats row */
    .stats { display: flex; justify-content: space-around; margin-top: 20px; gap: 8px; }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-val { font: 700 24px var(--mono); color: var(--text); }
    .stat-lbl { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
    .stat-div { width: 1px; background: var(--border); align-self: stretch; }

    /* Progress bar */
    .bar-track { width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.8s cubic-bezier(.4,0,.2,1);
    }
    .bar-labels { display: flex; justify-content: space-between; margin-top: 6px; font: 400 11px var(--mono); color: var(--muted); }

    /* Shift rows */
    .shift-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .shift-row:last-of-type { border-bottom: none; }
    .shift-date { font-size: 14px; font-weight: 600; display: block; }
    .shift-meta { font-size: 12px; color: var(--muted); display: block; margin-top: 2px; }
    .shift-hrs { font: 700 14px var(--mono); color: var(--accent); }

    .view-all {
      background: none; border: none;
      color: var(--accent2);
      font: 600 13px var(--sans);
      cursor: pointer;
      padding: 10px 0 0;
    }

    /* Form */
    label.field-label {
      display: block;
      font: 600 12px var(--sans);
      color: var(--subtle);
      margin: 14px 0 6px;
      letter-spacing: 0.3px;
    }
    input[type="date"],
    input[type="time"],
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font: 400 14px var(--sans);
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
    }
    .duration-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 14px;
      font-size: 14px;
      color: var(--subtle);
    }
    .duration-box strong { color: var(--accent); font: 700 14px var(--mono); }

    .btn-primary {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: var(--bg);
      font: 700 15px var(--sans);
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }

    /* Log list */
    .log-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin: 10px 16px 0;
    }
    .log-row { display: flex; justify-content: space-between; align-items: center; }
    .del-btn {
      background: none;
      border: 1px solid #334155;
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      width: 28px; height: 28px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .del-confirm { display: flex; align-items: center; gap: 8px; justify-content: space-between; }
    .del-confirm span { color: var(--danger); font-size: 13px; }
    .del-confirm .yes {
      background: #dc2626; border: none; border-radius: 6px;
      color: #fff; font: 600 12px var(--sans); padding: 4px 12px; cursor: pointer;
    }
    .del-confirm .no {
      background: var(--border); border: none; border-radius: 6px;
      color: var(--subtle); font: 600 12px var(--sans); padding: 4px 12px; cursor: pointer;
    }
    .btn-reset {
      display: block;
      margin: 20px auto;
      background: none;
      border: 1px solid #334155;
      border-radius: 8px;
      color: var(--danger);
      font: 600 13px var(--sans);
      padding: 8px 20px;
      cursor: pointer;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--border);
      color: var(--accent);
      font: 600 13px var(--sans);
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid rgba(0,229,160,0.2);
      animation: toastIn 0.3s ease;
      z-index: 100;
    }

    /* Empty */
    .empty { text-align: center; color: var(--muted); padding: 40px 0; }

    /* Views */
    .view { display: none; animation: fadeIn 0.3s ease; }
    .view.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div>
      <h1>ACP RIDE-OUT</h1>
      <p class="sub">Shift Tracker</p>
    </div>
    <div class="badge" id="shiftCount">0 <span>shifts</span></div>
  </header>

  <!-- Nav -->
  <nav>
    <button class="active" data-view="dashboard">📊 Dashboard</button>
    <button data-view="add">➕ Log Shift</button>
    <button data-view="log">📋 History</button>
  </nav>

  <!-- Dashboard -->
  <div class="view active" id="v-dashboard">
    <div class="card">
      <div class="ring-wrap">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00e5a0"/>
              <stop offset="100%" stop-color="#00b4d8"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="100" cy="100" r="80"/>
          <circle class="ring-fill" id="ringFill" cx="100" cy="100" r="80"
            stroke-dasharray="502.65" stroke-dashoffset="502.65"
            transform="rotate(-90 100 100)"/>
          <text class="ring-pct" id="ringPct" x="100" y="90" text-anchor="middle">0.0%</text>
          <text class="ring-label" x="100" y="115" text-anchor="middle">COMPLETE</text>
        </svg>
      </div>
      <div class="stats">
        <div class="stat"><span class="stat-val" id="hoursDone">0</span><span class="stat-lbl">Hours Done</span></div>
        <div class="stat-div"></div>
        <div class="stat"><span class="stat-val" id="hoursLeft">380</span><span class="stat-lbl">Hours Left</span></div>
        <div class="stat-div"></div>
        <div class="stat"><span class="stat-val" id="shiftsLeft">32</span><span class="stat-lbl">Shifts Left</span></div>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title">Target</h3>
      <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
      <div class="bar-labels"><span id="barDone">0h</span><span>380h</span></div>
    </div>

    <div class="card" id="recentCard" style="display:none">
      <h3 class="card-title">Recent</h3>
      <div id="recentList"></div>
      <button class="view-all" id="viewAllBtn" style="display:none">View all →</button>
    </div>
  </div>

  <!-- Add Shift -->
  <div class="view" id="v-add">
    <div class="card">
      <h3 class="card-title">Log a Shift</h3>

      <label class="field-label">Date</label>
      <input type="date" id="fDate">

      <label class="field-label">Start Time</label>
      <input type="time" id="fTime" value="07:00">

      <label class="field-label">Crew / Unit</label>
      <input type="text" id="fCrew" placeholder="e.g. SV-3, Medic 42">

      <div class="duration-box">
        <span>Shift Duration</span>
        <strong>12 hours</strong>
      </div>

      <button class="btn-primary" id="addBtn" disabled>Log Shift</button>
    </div>
  </div>

  <!-- History -->
  <div class="view" id="v-log">
    <div id="logList"></div>
    <button class="btn-reset" id="resetBtn" style="display:none">Clear All Shifts</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" style="display:none"></div>

  <script>
    const TARGET = 380;
    const SHIFT_H = 12;
    const KEY = "acp_rideout_shifts";

    // State
    let shifts = JSON.parse(localStorage.getItem(KEY) || "[]");
    let deleteTarget = null;
    let currentView = "dashboard";

    // Helpers
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    function fmtDate(iso) {
      const d = new Date(iso + "T12:00:00");
      return d.toLocaleDateString("en-CA", { year: "numeric", month: "short", day: "numeric" });
    }
    function fmtTime(t) {
      const [h, m] = t.split(":");
      const hr = parseInt(h);
      return `${hr % 12 || 12}:${m} ${hr >= 12 ? "PM" : "AM"}`;
    }
    function save() {
      localStorage.setItem(KEY, JSON.stringify(shifts));
    }

    let toastTimer;
    function toast(msg) {
      const el = $("#toast");
      el.textContent = msg;
      el.style.display = "block";
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.style.display = "none", 2500);
    }

    // Navigation
    $$("nav button").forEach((btn) => {
      btn.addEventListener("click", () => {
        currentView = btn.dataset.view;
        $$("nav button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        $$(".view").forEach((v) => v.classList.remove("active"));
        $(`#v-${currentView}`).classList.add("active");
        if (currentView === "log") renderLog();
      });
    });

    // Dashboard
    function renderDashboard() {
      const total = shifts.length * SHIFT_H;
      const remaining = Math.max(0, TARGET - total);
      const pct = (total / TARGET) * 100;
      const circ = 2 * Math.PI * 80;

      $("#ringFill").setAttribute("stroke-dashoffset", circ - (Math.min(pct, 100) / 100) * circ);
      $("#ringPct").textContent = pct.toFixed(1) + "%";
      $("#hoursDone").textContent = total;
      $("#hoursLeft").textContent = remaining;
      $("#shiftsLeft").textContent = Math.ceil(remaining / SHIFT_H);
      $("#barFill").style.width = Math.min(pct, 100) + "%";
      $("#barDone").textContent = total + "h";
      $("#shiftCount").innerHTML = `${shifts.length} <span>shifts</span>`;

      // Recent
      if (shifts.length > 0) {
        $("#recentCard").style.display = "";
        const recent = shifts.slice(0, 3);
        $("#recentList").innerHTML = recent.map((s) => `
          <div class="shift-row">
            <div>
              <span class="shift-date">${fmtDate(s.date)}</span>
              <span class="shift-meta">${fmtTime(s.startTime)} · ${s.crew}</span>
            </div>
            <span class="shift-hrs">${SHIFT_H}h</span>
          </div>
        `).join("");
        $("#viewAllBtn").style.display = shifts.length > 3 ? "" : "none";
      } else {
        $("#recentCard").style.display = "none";
      }
    }

    $("#viewAllBtn").addEventListener("click", () => {
      $$("nav button").forEach((b) => b.classList.remove("active"));
      $$("nav button")[2].classList.add("active");
      $$(".view").forEach((v) => v.classList.remove("active"));
      $("#v-log").classList.add("active");
      currentView = "log";
      renderLog();
    });

    // Add shift
    function checkForm() {
      const ok = $("#fDate").value && $("#fTime").value && $("#fCrew").value.trim();
      $("#addBtn").disabled = !ok;
    }
    ["fDate", "fTime", "fCrew"].forEach((id) => {
      $(`#${id}`).addEventListener("input", checkForm);
    });

    $("#addBtn").addEventListener("click", () => {
      const s = {
        id: Date.now().toString(),
        date: $("#fDate").value,
        startTime: $("#fTime").value,
        crew: $("#fCrew").value.trim(),
      };
      shifts.push(s);
      shifts.sort((a, b) => b.date.localeCompare(a.date));
      save();

      $("#fDate").value = "";
      $("#fTime").value = "07:00";
      $("#fCrew").value = "";
      $("#addBtn").disabled = true;

      // Switch to dashboard
      $$("nav button").forEach((b) => b.classList.remove("active"));
      $$("nav button")[0].classList.add("active");
      $$(".view").forEach((v) => v.classList.remove("active"));
      $("#v-dashboard").classList.add("active");
      currentView = "dashboard";

      renderDashboard();
      toast("Shift logged — 12h added");
    });

    // History
    function renderLog() {
      if (shifts.length === 0) {
        $("#logList").innerHTML = '<div class="card empty">No shifts logged yet.</div>';
        $("#resetBtn").style.display = "none";
        return;
      }
      $("#resetBtn").style.display = "";
      $("#logList").innerHTML = shifts.map((s) => `
        <div class="log-card" id="lc-${s.id}">
          <div class="log-row">
            <div>
              <span class="shift-date">${fmtDate(s.date)}</span>
              <span class="shift-meta">${fmtTime(s.startTime)} · ${s.crew} · ${SHIFT_H}h</span>
            </div>
            <button class="del-btn" onclick="confirmDel('${s.id}')">✕</button>
          </div>
        </div>
      `).join("");
    }

    window.confirmDel = function (id) {
      const card = $(`#lc-${id}`);
      card.innerHTML = `
        <div class="del-confirm">
          <span>Delete this shift?</span>
          <div style="display:flex;gap:6px">
            <button class="yes" onclick="doDelete('${id}')">Yes</button>
            <button class="no" onclick="renderLog()">No</button>
          </div>
        </div>
      `;
    };

    window.doDelete = function (id) {
      shifts = shifts.filter((s) => s.id !== id);
      save();
      renderLog();
      renderDashboard();
      toast("Shift removed");
    };

    $("#resetBtn").addEventListener("click", () => {
      if (confirm("Clear ALL logged shifts? This cannot be undone.")) {
        shifts = [];
        save();
        renderLog();
        renderDashboard();
        toast("All shifts cleared");
      }
    });

    // Init
    renderDashboard();

    // Register SW
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
</body>
</html>
