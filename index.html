<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  :root {
    --bg: #0b0e13;
    --surface: #13171e;
    --surface-2: #1a1f28;
    --surface-hover: #1e2430;
    --border: #252d3a;
    --text: #e2e8f0;
    --text-muted: #6b7a90;
    --accent: #60a5fa;
    --accent-dim: rgba(96,165,250,0.12);
    --day-color: #34d399;
    --day-bg: rgba(52,211,153,0.10);
    --day-border: rgba(52,211,153,0.30);
    --night-color: #c084fc;
    --night-bg: rgba(192,132,252,0.10);
    --night-border: rgba(192,132,252,0.30);
    --today-color: #fb923c;
    --today-bg: rgba(251,146,60,0.12);
    --today-border: rgba(251,146,60,0.45);
    --ftcc-color: #38bdf8;
    --ftcc-bg: rgba(56,189,248,0.10);
    --ftcc-border: rgba(56,189,248,0.30);
    --weekend-bg: rgba(255,255,255,0.02);
    --radius: 8px;
    --font: 'DM Sans', system-ui, sans-serif;
    --font-display: 'Playfair Display', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(96,165,250,0.06) 0%, transparent 60%),
      linear-gradient(rgba(96,165,250,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,165,250,0.02) 1px, transparent 1px);
    background-size: 100% 100%, 48px 48px, 48px 48px;
    pointer-events: none; z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 20px 20px 60px; padding-top: max(20px, env(safe-area-inset-top)); padding-bottom: max(60px, env(safe-area-inset-bottom)); }

  /* Header */
  header { text-align: center; padding: 36px 20px 28px; }
  header h1 {
    font-family: var(--font-display); font-size: clamp(1.8rem, 4.5vw, 3rem); font-weight: 800;
    background: linear-gradient(135deg, #e2e8f0 30%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 4px; letter-spacing: -0.3px;
  }
  header .subtitle { color: var(--text-muted); font-size: 0.88rem; }
  header .name-badge {
    display: inline-block; margin-top: 10px; padding: 4px 14px;
    background: var(--accent-dim); border: 1px solid rgba(96,165,250,0.2);
    border-radius: 20px; font-size: 0.78rem; font-weight: 600; color: var(--accent);
    letter-spacing: 0.3px;
  }

  /* Upload */
  .upload-bar {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 16px; cursor: pointer; transition: border-color 0.2s;
  }
  .upload-bar:hover { border-color: var(--accent); }
  .upload-bar svg { width: 18px; height: 18px; stroke: var(--accent); flex-shrink: 0; }
  .upload-bar span { font-size: 0.82rem; color: var(--text-muted); }
  .upload-bar .accent { color: var(--accent); font-weight: 600; }
  .upload-bar input { display: none; }

  /* Status */
  .status-msg {
    padding: 8px 14px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 12px;
    display: none; align-items: center; gap: 8px;
  }
  .status-msg.success { display: flex; background: var(--day-bg); border: 1px solid var(--day-border); color: var(--day-color); }
  .status-msg.error { display: flex; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #f87171; }
  .status-msg.loading { display: flex; background: var(--accent-dim); border: 1px solid rgba(96,165,250,0.2); color: var(--accent); }

  /* Controls */
  .controls {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    padding: 10px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 18px;
  }
  .year-nav { display: flex; align-items: center; gap: 6px; }
  .year-nav button {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 5px 12px; cursor: pointer; font-family: var(--font);
    font-size: 0.82rem; font-weight: 600; transition: all 0.15s;
  }
  .year-nav button:hover { border-color: var(--accent); color: var(--accent); }
  .year-label { font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; min-width: 56px; text-align: center; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--text-muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 3px; }
  .legend-dot.day { background: var(--day-color); }
  .legend-dot.night { background: var(--night-color); }
  .legend-dot.ftcc { background: var(--ftcc-color); }
  .legend-dot.today { background: var(--today-color); }

  .stats { font-size: 0.78rem; color: var(--text-muted); display: flex; gap: 12px; flex-wrap: wrap; }
  .stats strong { color: var(--text); font-weight: 600; }

  /* Calendar */
  .calendar-year { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .month-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; transition: border-color 0.2s;
    animation: fadeUp 0.35s ease both;
  }
  .month-card:hover { border-color: rgba(96,165,250,0.25); }
  .month-card:nth-child(1){animation-delay:.01s}.month-card:nth-child(2){animation-delay:.03s}.month-card:nth-child(3){animation-delay:.05s}
  .month-card:nth-child(4){animation-delay:.07s}.month-card:nth-child(5){animation-delay:.09s}.month-card:nth-child(6){animation-delay:.11s}
  .month-card:nth-child(7){animation-delay:.13s}.month-card:nth-child(8){animation-delay:.15s}.month-card:nth-child(9){animation-delay:.17s}
  .month-card:nth-child(10){animation-delay:.19s}.month-card:nth-child(11){animation-delay:.21s}.month-card:nth-child(12){animation-delay:.23s}

  .month-name { font-weight: 700; font-size: 0.92rem; margin-bottom: 8px; color: var(--accent); font-family: var(--font-display); letter-spacing: 0.2px; }
  .day-headers { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin-bottom: 3px; }
  .day-header { text-align: center; font-size: 0.6rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; padding: 2px 0; }
  .days-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }

  .day-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 500; border-radius: 4px; position: relative; cursor: default; transition: transform 0.12s;
  }
  .day-cell:not(.empty):hover { transform: scale(1.2); z-index: 5; }
  .day-cell.weekend { background: var(--weekend-bg); }

  .day-cell.shift-day { background: var(--day-bg); color: var(--day-color); font-weight: 700; box-shadow: inset 0 0 0 1.5px var(--day-border); }
  .day-cell.shift-night { background: var(--night-bg); color: var(--night-color); font-weight: 700; box-shadow: inset 0 0 0 1.5px var(--night-border); }
  .day-cell.shift-ftcc-day { background: var(--ftcc-bg); color: var(--ftcc-color); font-weight: 700; box-shadow: inset 0 0 0 1.5px var(--ftcc-border); }
  .day-cell.shift-ftcc-night { background: var(--ftcc-bg); color: var(--ftcc-color); font-weight: 700; box-shadow: inset 0 0 0 1.5px var(--ftcc-border); }
  .day-cell.today { background: var(--today-bg) !important; color: var(--today-color) !important; font-weight: 700; box-shadow: inset 0 0 0 2px var(--today-border) !important; }

  /* Shift type dots */
  .day-cell .shift-dot {
    position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%;
  }
  .day-cell.today.has-shift .shift-dot { display: block; }
  .shift-dot.dot-day { background: var(--day-color); }
  .shift-dot.dot-night { background: var(--night-color); }
  .shift-dot.dot-ftcc { background: var(--ftcc-color); }

  /* Tooltip */
  .tip {
    display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: #1e2430; border: 1px solid var(--border); color: var(--text);
    padding: 7px 11px; border-radius: 7px; font-size: 0.7rem; white-space: nowrap;
    z-index: 100; pointer-events: none; box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    line-height: 1.5;
  }
  .tip .tip-label { font-weight: 700; }
  .tip .tip-unit { color: var(--accent); }
  .tip .tip-time { color: var(--text-muted); }
  .tip .tip-note { color: var(--today-color); font-style: italic; }
  .day-cell:hover .tip { display: block; }

  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  @media (max-width: 640px) {
    .controls { flex-direction: column; align-items: flex-start; }
    .calendar-year { grid-template-columns: 1fr; }
    .app { padding: 12px 10px 40px; }
  }

  .hidden { display: none !important; }
</style>
</head>

<div class="app">
  <header>
    <h1>Shift Calendar</h1>
    <p class="subtitle">Peel Regional Paramedic Services</p>
    <div class="name-badge">GJERGJI, RINALDO</div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="controls" id="controls">
    <div class="year-nav">

      <div class="legend-item"><div class="legend-dot today"></div>Today</div>
    </div>
    <div class="stats" id="stats"></div>

  <div id="calendarContainer"></div>
</div>

// ─── Pre-loaded schedule from Peel Regional PDF ───

function addShift(dateStr, unit, start, end, notes) {
  let shiftType = 'day';
  const startH = parseInt(start.split(':')[0]);
  if (startH >= 17 || startH < 5) shiftType = 'night';
  const isFTCC = unit.toUpperCase().includes('FTCC');
  if (isFTCC) shiftType = shiftType === 'night' ? 'ftcc-night' : 'ftcc-day';
  scheduleData[dateStr] = { shift: shiftType, unit, start, end, notes: notes || '' };
}

function showStatus(msg, type) {
  statusMsg.className = 'status-msg ' + type;
  statusMsg.textContent = msg;
  if (type === 'success' || type === 'error') setTimeout(() => { statusMsg.className = 'status-msg'; }, 5000);
}

async function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') {
    showStatus('Parsing PDF schedule...', 'loading');
    try {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(item => item.str).join(' ') + '\n';
      }
      const count = parsePeelPDF(fullText);
      showStatus(`Loaded ${count} shifts from ${file.name}`, 'success');
      render();
    } catch (err) {
      showStatus('Error reading PDF: ' + err.message, 'error');
    }
  } else {
    const text = await file.text();
    const count = parseCSV(text);
    showStatus(`Loaded ${count} shifts from ${file.name}`, 'success');
    render();
  }
  fileInput.value = '';
}

// ─── Peel Regional PDF parser ───
function parsePeelPDF(text) {
  let count = 0;
  // Find month/year headers
  const monthMap = {};
  MONTHS.forEach((m, i) => { monthMap[m.toLowerCase()] = i; });

  const sections = text.split(/(?=January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{4}/i);

  for (const section of sections) {
    const headerMatch = section.match(/(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{4})/i);
    if (!headerMatch) continue;
    const monthIdx = monthMap[headerMatch[1].toLowerCase()];
    const year = parseInt(headerMatch[2]);

    // Match patterns like: DD SV-1 0730 07:30 - 19:30 or DD FTCC Day Shift 06:00 - 18:00
    const shiftPattern = /\b(\d{1,2})\s+(SV-\d|TK-\d|FTCC)[^\d]*?(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/gi;
    let match;
    while ((match = shiftPattern.exec(section)) !== null) {
      const day = parseInt(match[1]);
      if (day < 1 || day > 31) continue;
      const unit = match[2].toUpperCase();
      const start = match[3];
      const end = match[4];
      const dateStr = `${year}-${String(monthIdx + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

      // Extract notes nearby
      let notes = '';
      const afterMatch = section.substring(match.index + match[0].length, match.index + match[0].length + 40);
      const noteMatch = afterMatch.match(/(VAC|STA|PBK|pbk|S\/C[^0-9]*?)(?=\d|\s{3}|$)/i);
      if (noteMatch) notes = noteMatch[1].trim();

      addShift(dateStr, unit, start, end, notes);
      count++;
    }
  }
  return count;
}

// ─── CSV parser ───
function parseCSV(text) {
  let count = 0;
  const lines = text.trim().split(/\r?\n/);
  const delim = lines[0].includes('\t') ? '\t' : ',';
  const rows = lines.map(l => l.split(delim).map(c => c.trim().replace(/^"|"$/g, '')));
  const hdr = rows[0].map(c => c.toLowerCase());
  let dateCol = hdr.findIndex(c => /date|day/.test(c));
  let shiftCol = hdr.findIndex(c => /shift|type|unit/.test(c));
  let startCol = hdr.findIndex(c => /start|begin/.test(c));
  let endCol = hdr.findIndex(c => /end|finish/.test(c));
  let notesCol = hdr.findIndex(c => /note|comment/.test(c));
  if (dateCol < 0) dateCol = 0;

  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[dateCol]) continue;
    const d = parseDate(r[dateCol]);
    if (!d) continue;
    const unit = shiftCol >= 0 ? r[shiftCol] || '' : '';
    const start = startCol >= 0 ? r[startCol] || '07:00' : '07:00';
    const end = endCol >= 0 ? r[endCol] || '19:00' : '19:00';
    const notes = notesCol >= 0 ? r[notesCol] || '' : '';
    addShift(d, unit, start, end, notes);
    count++;
  }
  return count;
}

function parseDate(raw) {
  raw = raw.trim().replace(/['"]/g, '');
  let m = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  return null;
}

// ─── Render ───
function render() {
  yearLabel.textContent = currentYear;
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  let dayC = 0, nightC = 0, ftccC = 0, totalHrs = 0;
  Object.entries(scheduleData).forEach(([d, v]) => {
    if (!d.startsWith(String(currentYear))) return;
    if (v.shift.includes('ftcc')) ftccC++;
    else if (v.shift === 'night') nightC++;
    else dayC++;
    // Calculate hours
    const [sh, sm] = v.start.split(':').map(Number);
    const [eh, em] = v.end.split(':').map(Number);
    let hrs = eh - sh + (em - sm) / 60;
    if (hrs <= 0) hrs += 24;
    totalHrs += hrs;
  });

  statsEl.innerHTML = `
    <span><strong>${dayC + nightC + ftccC}</strong> shifts</span>
    <span><strong>${dayC}</strong> day</span>
    <span><strong>${nightC}</strong> night</span>
    <span><strong>${ftccC}</strong> FTCC</span>
    <span><strong>${Math.round(totalHrs)}</strong> hrs</span>
  `;

  let html = '<div class="calendar-year">';
  for (let month = 0; month < 12; month++) {
    html += `<div class="month-card"><div class="month-name">${MONTHS[month]}</div>`;
    html += '<div class="day-headers">';
    DAYS_H.forEach(d => html += `<div class="day-header">${d}</div>`);
    html += '</div><div class="days-grid">';

    // Monday-start: getDay() returns 0=Sun, we want 0=Mon
    let firstDay = new Date(currentYear, month, 1).getDay();
    firstDay = firstDay === 0 ? 6 : firstDay - 1; // Convert to Mon=0
    const daysInMonth = new Date(currentYear, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) html += '<div class="day-cell empty"></div>';

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${currentYear}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dow = new Date(currentYear, month, day).getDay();
      const isWeekend = dow === 0 || dow === 6;
      const isToday = dateStr === todayStr;
      const entry = scheduleData[dateStr];

      let cls = 'day-cell';
      if (isWeekend) cls += ' weekend';
      if (entry) {
        if (entry.shift === 'ftcc-day' || entry.shift === 'ftcc-night') cls += ` shift-${entry.shift}`;
        else cls += entry.shift === 'night' ? ' shift-night' : ' shift-day';
      }
      if (isToday) cls += ' today' + (entry ? ' has-shift' : '');

      let tip = '';
      if (entry || isToday) {
        const dateObj = new Date(currentYear, month, day);
        const dateFmt = dateObj.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
        let lines = `<span class="tip-label">${dateFmt}</span>`;
        if (isToday) lines += ' · <span style="color:var(--today-color)">Today</span>';
        if (entry) {
          const shiftLabel = entry.shift.includes('ftcc')
            ? (entry.shift === 'ftcc-night' ? 'FTCC Night' : 'FTCC Day')
            : (entry.shift === 'night' ? 'Night' : 'Day');
          lines += `<br><span class="tip-unit">${entry.unit}</span> · <span class="tip-time">${entry.start} – ${entry.end}</span> · ${shiftLabel}`;
          if (entry.notes) lines += `<br><span class="tip-note">${entry.notes}</span>`;
        }
        tip = `<span class="tip">${lines}</span>`;
      }

      // Dot indicator for today with a shift
      let dot = '';
      if (isToday && entry) {
        const dotType = entry.shift.includes('ftcc') ? 'ftcc' : entry.shift;
        dot = `<span class="shift-dot dot-${dotType}"></span>`;
      }

      html += `<div class="${cls}">${day}${dot}${tip}</div>`;
    }

    html += '</div></div>';
  }
  html += '</div>';
  calendarContainer.innerHTML = html;
}

// Initial render

  `;

    banner.remove();
  });

  document.getElementById('installDismiss').addEventListener('click', () => banner.remove());
}

window.addEventListener('appinstalled', () => {
